server {
    listen 80;
    server_name localhost;
    add_header Access-Control-Allow-Origin "https://status.skia.ca" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Origin" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /status.js {
        try_files $uri =404;
    }

    location /incidents.js {
        try_files $uri =404;
    }

    location = /incidents.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # Keep browser calls same-origin and proxy upstream server-side.
    location /api/ {
        proxy_pass https://api.skia.ca;
        proxy_http_version 1.1;
        proxy_set_header Host api.skia.ca;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_buffering off;
        proxy_ssl_server_name on;
    }
}
